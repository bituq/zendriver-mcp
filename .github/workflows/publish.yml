name: Publish to PyPI + MCP Registry

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Build sdist and wheel
        run: uv build

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing requires an id-token permission and a matching PyPI
    # configuration (Settings > Publishing > Add a new pending publisher).
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/zendriver-mcp/
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  mcp-registry:
    needs: publish
    runs-on: ubuntu-latest
    # OIDC token used by mcp-publisher to prove we own io.github.bituq/*.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -sSL \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher

      - name: Sync server.json version with tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          python3 -c "import json,pathlib; p=pathlib.Path('server.json'); d=json.loads(p.read_text()); d['version']='$VERSION'; d['packages'][0]['version']='$VERSION'; p.write_text(json.dumps(d, indent=2))"
          cat server.json

      - name: Authenticate to MCP Registry via OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
